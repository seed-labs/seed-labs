# Add this block to AS-161's BIRD configuration to announce a more-specific
# subprefix of AS-154's network. This usually has stronger forwarding impact
# than an equal-prefix hijack because routers use longest-prefix matching.

protocol static {
    ipv4 {
        table t_bgp;
    };
    route 10.154.0.0/25 blackhole {
        bgp_large_community.add(LOCAL_COMM);
    };
}
