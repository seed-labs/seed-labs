# Example provider-side import filter logic for AS-3.
# Paste the condition into the import filter for the BGP session with AS-161.
#
# The exact protocol block name depends on the generated emulator.
# Use `birdc show protocols` to identify the AS-161 session.

if net ~ [ 10.154.0.0/24{24,32} ] then {
    print "Rejecting unauthorized AS-154 prefix from AS-161: ", net;
    reject;
}
